[main]
term=foot
dpi-aware=yes
pad=5x2 center
font=InconsolataNerdFontMono-Regular:size=9
font-italic=InconsolataNerdFontMono-Italic:size=9
font-bold=InconsolataNerdFontMono-Bold:size=9

[url]
launch=xdg-open ${url}

[cursor]
blink=yes

[mouse]
hide-when-typing=yes

[scrollback]
lines=10000

[colors-dark]
alpha=1
background=242933
